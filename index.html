<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rana’s Birthday Night</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e10;
  color: #fff;
  text-align: center;
}

.hero {
  background: url("https://images.unsplash.com/photo-1527529482837-4698179dc6ce") center/cover;
  height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.overlay {
  background: rgba(0,0,0,0.6);
  position: absolute;
  inset: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
}

h1 { font-size: 40px; margin: 0; }
p { font-size: 16px; opacity: 0.9; }

.section { padding: 40px 20px; }

.card {
  background: #1a1a1d;
  padding: 25px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
  font-size: 16px;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #444; color: white; }

.countdown {
  font-size: 20px;
  margin-top: 10px;
  color: #ffcc70;
}

#responseText {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

/* 💔 SHAKE ANIMATION */
@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(4px, 0px); }
  50% { transform: translate(-4px, 0px); }
  75% { transform: translate(4px, 0px); }
  100% { transform: translate(0px, 0px); }
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Rana’s Birthday Night 💋</h1>
    <p>30 APRIL • ULUS 29 • 20:30</p>
    <p>25 oluyorum... ben de tam olarak hazır değilim 🥹</p>
     <p>Ama bunu güzel bir geceyle kutlamaya hazırım 💋</p>
  </div>
</div>

<div class="section">
  <div class="card">

    <h2 id="welcomeText">Hoş geldin 💋</h2>

    <p>
     25’i güzel insanlarla karşılıyorum… sen de olmalısın ✨<br><br>
      💄 Dress code: <b>chic / sexy</b><br>
     
    </p>

    <div class="countdown" id="countdown"></div>

    <h3>Katılım Durumu</h3>

    <button class="yes" onclick="openForm('yes')">Katılıyorum 💋</button>
    <button class="no" onclick="openForm('no')">Kaçırıyorum 😭</button>

    <div id="responseText"></div>

  </div>
</div>

<script>

// ================= CONFIG =================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkBOUyplfxgwvE_nRaH7KTUYbNSlJ9YjfM0W-Ex-IAj5NHz3iuNvivTB76HPqb64pLRA/exec";

// ================= DATA =================
const allowedNames = ["Süleyman", "Rana", "Sümeyye", "Kevser", "Buse", "Kübra", "Berra", "Merve"];

// ================= CONFETTI =================
function fireConfetti() {
  confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }
  });
}

// ================= SAD EFFECT =================
function sadReaction() {

  document.body.style.animation = "shake 0.3s";

  setTimeout(() => {
    document.body.style.animation = "";
  }, 300);

  document.getElementById("responseText").innerText =
    "😭 Üzüldüm... seni orada görmek isterdim";
}

// ================= URL NAME =================
function getName() {
  const params = new URLSearchParams(window.location.search);
  return params.get("name");
}

// ================= ACCESS CONTROL =================
function checkAccess(name) {

  if (!name || !allowedNames.includes(name)) {
    document.body.innerHTML = `
      <div style="color:white;text-align:center;margin-top:20vh;font-family:Arial;">
        <h1>💌 Private Invitation</h1>
        <p>This event is private.</p>
      </div>
    `;
    return false;
  }

  return true;
}

// ================= UI =================
function setName(name) {

  let text = "Hoş geldin, Özel Davetli 💋";

  if (name) {
    let clean = name.charAt(0).toUpperCase() + name.slice(1);
    text = `Hoş geldin, ${clean} 💋`;
  }

  document.getElementById("welcomeText").innerText = text;
}

// ================= RSVP =================
function openForm(type) {

  let name = getName() || "Unknown";
  let response = type === "yes" ? "YES" : "NO";

  if (type === "yes") fireConfetti();
  if (type === "no") sadReaction();

  fetch(`${SCRIPT_URL}?name=${name}&response=${response}`)
    .then(() => {
      document.getElementById("responseText").innerText =
        type === "yes"
          ? "Katılımın alındı 💋 Sensiz olmazdı zaten, seni bekliyorum aşkoo!"
          : "Teşekkür ederiz 😭";
    });
}

// ================= COUNTDOWN =================
function startCountdown() {

  let eventDate = new Date("April 30, 2026 20:30:00").getTime();

  setInterval(() => {

    let now = new Date().getTime();
    let distance = eventDate - now;

    let days = Math.floor(distance / (1000 * 60 * 60 * 24));
    let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      `⏳ ${days}g ${hours}s ${minutes}dk ${seconds}sn`;

    if (distance < 0) {
      document.getElementById("countdown").innerHTML = "🎉 Tonight is the night!";
    }

  }, 1000);
}

// ================= INIT =================
window.onload = function () {

  let name = getName();

  setName(name);

  if (!checkAccess(name)) return;

  startCountdown();
};

</script>

</body>
</html>
